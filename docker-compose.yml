services:
  backend:
    build: .
    env_file: backend/.env
    environment:
      - DATABASE_PATH=/app/data/agent.db
    volumes:
      - agent_db:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  agent_db:
