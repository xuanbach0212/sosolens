services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sosolens
      POSTGRES_USER: sosolens
      POSTGRES_PASSWORD: sosolens
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sosolens"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://sosolens:sosolens@db:5432/sosolens
      - FREE_TIER_DELAY_MINUTES=0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
